name: aicompanion

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aicompanion-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./models/ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: aicompanion-open-webui
    restart: unless-stopped
    depends_on:
      - ollama
      - fastapi-bridge
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${OPENWEBUI_SECRET_KEY:-change-me-local-only}
    volumes:
      - ./docker/openwebui:/app/backend/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aicompanion-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - ./qdrant:/qdrant/storage
      - ./docker/qdrant/config.yaml:/qdrant/config/production.yaml:ro

  comfyui:
    image: yanwk/comfyui-boot:cu124-slim
    container_name: aicompanion-comfyui
    restart: unless-stopped
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    environment:
      - CLI_ARGS=--listen 0.0.0.0 --port 8188
    command: >-
      bash -lc "python3 -m pip install --no-cache-dir blake3 || true; MAIN_PY=''; if [ -f /workspace/ComfyUI/main.py ]; then MAIN_PY='/workspace/ComfyUI/main.py'; fi; if [ -z \"$$MAIN_PY\" ] && [ -f /root/ComfyUI/main.py ]; then MAIN_PY='/root/ComfyUI/main.py'; fi; if [ -z \"$$MAIN_PY\" ]; then MAIN_PY='/workspace/ComfyUI/main.py'; fi; python3 -c \"import re; from pathlib import Path; pkg_stub='__all__ = []\\n'; mod_stub='def _noop(*args, **kwargs):\\n    return None\\n\\ndef init(*args, **kwargs):\\n    return None\\n\\ndef __getattr__(name):\\n    return _noop\\n'; bases=['/root/ComfyUI','/workspace/ComfyUI','/opt/comfy_patches']; scan_roots=[Path('/root/ComfyUI'), Path('/workspace/ComfyUI')]; refs=set(['control']); pattern=re.compile(r'comfy_aimdo\\.([A-Za-z_][A-Za-z0-9_]*)'); [refs.update(pattern.findall(f.read_text(encoding='utf-8', errors='ignore'))) for r in scan_roots if r.exists() for f in r.rglob('*.py')]; [((Path(b)/'comfy_aimdo').mkdir(parents=True, exist_ok=True), (Path(b)/'comfy_aimdo'/'__init__.py').write_text(pkg_stub, encoding='utf-8'), [(Path(b)/'comfy_aimdo'/f'{m}.py').write_text(mod_stub, encoding='utf-8') for m in refs]) for b in bases]\"; export PYTHONPATH=/opt/comfy_patches:$$PYTHONPATH; exec python3 \"$$MAIN_PY\" --listen 0.0.0.0 --port 8188"
    volumes:
      - ./models:/workspace/ComfyUI/models
      - ./models:/root/ComfyUI/models
      - ./loras:/workspace/ComfyUI/models/loras
      - ./loras:/root/ComfyUI/models/loras
      - ./workflows:/workspace/ComfyUI/user/default/workflows
      - ./workflows:/root/ComfyUI/user/default/workflows
      - ./images:/workspace/ComfyUI/output
      - ./images:/root/ComfyUI/output
      - ./reference_photos:/workspace/ComfyUI/input
      - ./reference_photos:/root/ComfyUI/input
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  fastapi-bridge:
    build:
      context: ./docker/fastapi
      dockerfile: Dockerfile
    container_name: aicompanion-fastapi-bridge
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_CHAT_TIMEOUT_SECONDS=${OLLAMA_CHAT_TIMEOUT_SECONDS:-600}
      - QDRANT_URL=http://qdrant:6333
      - COMFYUI_URL=http://comfyui:8188
    depends_on:
      - ollama
      - qdrant
      - comfyui
    ports:
      - "${FASTAPI_PORT:-8080}:8080"
    volumes:
      - ./characters:/data/characters
      - ./memories:/data/memories
      - ./images:/data/images
      - ./models:/data/models
      - ./loras:/data/loras
      - ./workflows:/data/workflows
      - ./reference_photos:/data/reference_photos
      - ./logs:/data/logs
      - ./backups:/data/backups

  companion-ui:
    build:
      context: ./docker/flaskui
      dockerfile: Dockerfile
    container_name: aicompanion-companion-ui
    restart: unless-stopped
    depends_on:
      - fastapi-bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FASTAPI_URL=http://fastapi-bridge:8080
      - LMSTUDIO_URL=http://192.168.1.60:1234/v1
      - REFERENCE_PHOTOS_DIR=/data/reference_photos
      - IMAGES_DIR=/data/images
      - LMSTUDIO_DEFAULT_TEXT_MODEL=${LMSTUDIO_DEFAULT_TEXT_MODEL:-}
      - LMSTUDIO_FALLBACK_TEXT_MODEL=${LMSTUDIO_FALLBACK_TEXT_MODEL:-}
      - LMSTUDIO_EXTRA_MODELS=${LMSTUDIO_EXTRA_MODELS:-}
      - CHAT_TIMEOUT_SECONDS=${CHAT_TIMEOUT_SECONDS:-240}
    ports:
      - "${COMPANION_UI_PORT:-5050}:5000"
    volumes:
      - ./reference_photos:/data/reference_photos
      - ./images:/data/images

networks:
  default:
    name: aicompanion-network
